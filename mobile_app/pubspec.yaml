name: sedai_diagnostic
description: "SEDAI - Système Embarqué de Diagnostic Automobile Intelligent"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  web_socket_channel: ^2.4.0
  syncfusion_flutter_gauges: ^33.1.45
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  flutter_animate: ^4.2.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/